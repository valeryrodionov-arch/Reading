<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff4d4d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="קריאה מהירה">
    <link rel="manifest" href="manifest.json">
    <title>משחק הקריאה המהירה</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0f2f5 0%, #dde3ec 100%);
            -webkit-tap-highlight-color: transparent;
        }
        #game-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            width: 92%;
            max-width: 500px;
        }
        .screen { display: none; }
        .screen.active { display: block; }

        /* תפריט */
        #menu h1 { font-size: 2rem; color: #333; margin: 0 0 0.4rem; }
        #menu p { color: #777; font-size: 1rem; margin: 0 0 1.5rem; }

        /* רמות */
        #level-select h2 { font-size: 1.5rem; color: #333; margin: 0 0 1.2rem; }
        .level-btn {
            display: block; width: 100%; margin: 0.5rem 0;
            padding: 1rem 1.5rem; border: 2px solid transparent;
            border-radius: 12px; font-size: 1.05rem; font-weight: bold;
            cursor: pointer; text-align: right; transition: transform 0.1s;
        }
        .level-btn:active { transform: scale(0.97); }
        .level-btn .level-desc { font-size: 0.82rem; font-weight: normal; opacity: 0.8; display: block; margin-top: 2px; }
        .level-1 { background: #e8f8f0; border-color: #27ae60; color: #1a7a44; }
        .level-2 { background: #e8f0ff; border-color: #3498db; color: #1a5fa8; }
        .level-3 { background: #fff4e0; border-color: #f39c12; color: #a06800; }
        .level-4 { background: #fdecea; border-color: #e74c3c; color: #a02020; }

        /* ספירה לאחור */
        #countdown-display {
            font-size: 6rem; font-weight: bold; color: #e74c3c;
            min-height: 130px; display: flex; align-items: center; justify-content: center;
        }

        /* משחק */
        #counter { font-size: 1rem; color: #999; margin-bottom: 0.3rem; }
        #timer-display { font-size: 1.5rem; font-weight: bold; color: #e74c3c; margin-bottom: 0.8rem; }
        #image-container {
            display: none; margin-bottom: 0.8rem; border-radius: 12px;
            overflow: hidden; background: #f8f8f8; height: 160px;
            align-items: center; justify-content: center;
        }
        #image-container.visible { display: flex; }
        #word-display {
            font-size: 3rem; font-weight: bold; margin: 1rem 0;
            min-height: 80px; color: #222; line-height: 1.3;
        }
        #word-display.multi { font-size: 2rem; }
        #word-display.long { font-size: 1.55rem; }
        #red-button {
            background-color: #ff4d4d; color: white; border: none;
            padding: 1.1rem 2.5rem; font-size: 1.3rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 0 #cc0000; transition: all 0.1s; margin-top: 0.3rem;
        }
        #red-button:active { box-shadow: 0 0 0 #cc0000; transform: translateY(4px); }

        /* הזנת שם */
        #name-entry h2 { font-size: 1.5rem; color: #333; margin: 0 0 0.3rem; }
        #final-time-display { font-size: 2.2rem; font-weight: bold; color: #e74c3c; margin: 0.4rem 0 1rem; }
        #player-name {
            width: 100%; padding: 0.8rem 1rem; font-size: 1.1rem;
            border: 2px solid #ddd; border-radius: 10px; text-align: center;
            margin-bottom: 0.8rem; direction: rtl;
        }
        #player-name:focus { outline: none; border-color: #3498db; }

        /* לוח תוצאות */
        #leaderboard h2 { font-size: 1.5rem; color: #333; margin: 0 0 0.8rem; }
        .lb-tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; justify-content: center; flex-wrap: wrap; }
        .lb-tab {
            padding: 0.35rem 0.8rem; border-radius: 20px; border: 2px solid #ddd;
            background: white; cursor: pointer; font-size: 0.82rem; font-weight: bold; color: #777;
        }
        .lb-tab.active { background: #333; color: white; border-color: #333; }
        .lb-list { list-style: none; padding: 0; margin: 0 0 1rem; text-align: right; }
        .lb-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.55rem 0.8rem; border-radius: 8px; margin-bottom: 0.3rem; background: #f8f8f8; font-size: 1rem;
        }
        .lb-list li:first-child { background: #fff8e0; }
        .lb-list li:nth-child(2) { background: #f5f5f5; }
        .lb-list li:nth-child(3) { background: #fff0ea; }
        .lb-rank { font-weight: bold; color: #aaa; min-width: 26px; }
        .lb-name { flex: 1; padding: 0 0.5rem; }
        .lb-time { font-weight: bold; color: #e74c3c; }

        /* כפתורים */
        .btn {
            display: inline-block; padding: 0.8rem 1.6rem; border: none;
            border-radius: 50px; font-size: 1rem; font-weight: bold;
            cursor: pointer; margin: 0.3rem; transition: all 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-green { background: #27ae60; color: white; box-shadow: 0 3px 0 #1e8449; }
        .btn-blue { background: #3498db; color: white; box-shadow: 0 3px 0 #2176ae; }
        .btn-gray { background: #ecf0f1; color: #555; box-shadow: 0 3px 0 #bdc3c7; }

        #install-banner {
            display: none; background: #fff3cd; border: 1px solid #ffc107;
            border-radius: 10px; padding: 0.7rem 1rem; font-size: 0.85rem; color: #555; margin-top: 1rem;
        }
        #install-btn {
            background: #ffc107; border: none; border-radius: 20px;
            padding: 5px 14px; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-top: 5px;
        }
    </style>
</head>
<body>
<div id="game-container">

    <!-- תפריט ראשי -->
    <div id="menu" class="screen active">
        <h1>🏃 קריאה מהירה</h1>
        <p>קרא את הטקסט מהר ככל האפשר ולחץ לעבור הלאה</p>
        <button class="btn btn-green" style="font-size:1.3rem;padding:1.1rem 3rem;" onclick="showScreen('level-select')">התחל משחק</button>
        <br>
        <button class="btn btn-gray" style="margin-top:0.6rem;" onclick="showLeaderboard(1)">🏆 לוח תוצאות</button>
        <div id="install-banner">
            📲 רוצה להוסיף למסך הבית?<br>
            <button id="install-btn">הוסף כאפליקציה</button>
        </div>
    </div>

    <!-- בחירת רמה -->
    <div id="level-select" class="screen">
        <h2>בחר רמת קושי</h2>
        <button class="level-btn level-1" onclick="startGame(1)">
            🟢 קל — מילה בודדת
            <span class="level-desc">מילה אחת בכל פעם, 10 מילים</span>
        </button>
        <button class="level-btn level-2" onclick="startGame(2)">
            🔵 בינוני — משפטים קצרים
            <span class="level-desc">משפטים של 3 מילים, 10 משפטים</span>
        </button>
        <button class="level-btn level-3" onclick="startGame(3)">
            🟠 קשה — משפטים ארוכים
            <span class="level-desc">משפטים של 5 מילים, 10 משפטים</span>
        </button>
        <button class="level-btn level-4" onclick="startGame(4)">
            🔴 מומחה — כתוביות
            <span class="level-desc">תמונה + משפטים של 6 מילים, 10 סצנות</span>
        </button>
        <br>
        <button class="btn btn-gray" onclick="showScreen('menu')">← חזרה</button>
    </div>

    <!-- ספירה לאחור -->
    <div id="countdown-screen" class="screen">
        <div style="font-size:1rem;color:#999;margin-bottom:0.5rem;">מתחילים בעוד...</div>
        <div id="countdown-display">3</div>
    </div>

    <!-- משחק -->
    <div id="game-ui" class="screen">
        <div id="counter">פריט 1 מתוך 10</div>
        <div id="timer-display">⏱ 0.0</div>
        <div id="image-container"></div>
        <div id="word-display"></div>
        <button id="red-button" onclick="nextItem()">הבא ←</button>
    </div>

    <!-- הזנת שם -->
    <div id="name-entry" class="screen">
        <h2>🎉 סיימת!</h2>
        <div id="final-time-display"></div>
        <p style="color:#777;margin:0 0 0.8rem;">הכנס את שמך ללוח התוצאות:</p>
        <input type="text" id="player-name" placeholder="השם שלך" maxlength="20">
        <br>
        <button class="btn btn-green" onclick="saveScore()">שמור תוצאה 🏆</button>
        <button class="btn btn-gray" onclick="showLeaderboard(currentLevel)">דלג</button>
    </div>

    <!-- לוח תוצאות -->
    <div id="leaderboard" class="screen">
        <h2>🏆 לוח תוצאות</h2>
        <div class="lb-tabs">
            <button class="lb-tab" onclick="switchLbTab(1)">🟢 קל</button>
            <button class="lb-tab" onclick="switchLbTab(2)">🔵 בינוני</button>
            <button class="lb-tab" onclick="switchLbTab(3)">🟠 קשה</button>
            <button class="lb-tab" onclick="switchLbTab(4)">🔴 מומחה</button>
        </div>
        <ul class="lb-list" id="lb-list"></ul>
        <button class="btn btn-green" onclick="showScreen('level-select')">משחק חדש 🎮</button>
        <button class="btn btn-gray" onclick="showScreen('menu')">← תפריט</button>
    </div>

</div>
<script>
const wordsPool = [
    "שולחן","לרוץ","גדול","בית","ספר","מהיר","לאכול","ילד","ירוק","חכם",
    "מחשב","לכתוב","יפה","שמש","ענן","לקפוץ","קטן","חריף","מורה","לטייל",
    "כלב","חתול","עץ","פרח","דלת","חלון","מכונית","אוטובוס","ים","הר"
];
const phrases3 = [
    "הילד רץ מהר","הכלב אוכל עכשיו","השמש זורחת יפה",
    "המורה כותבת בספר","הענן גדול מאוד","הבית ירוק ויפה",
    "הילדה קופצת גבוה","המחשב עובד מהר","הפרח קטן וחכם",
    "האוטובוס נוסע רחוק","הים כחול עמוק","ההר גדול וחזק"
];
const phrases5 = [
    "הילד הקטן רץ מהר מאוד","הכלב החכם אוכל את האוכל",
    "השמש הגדולה זורחת על הים","המורה היפה כותבת בספר חדש",
    "הענן הלבן עף גבוה בשמיים","הבית הירוק נמצא ליד ההר",
    "הילדה השמחה קופצת על החבל","המחשב החדש עובד מהר מאוד",
    "הפרח הצבעוני פורח באביב","האוטובוס הגדול נוסע לעיר"
];
const phrases6 = [
    "הילד הקטן והחכם רץ מהר מאוד","הכלב החכם אוכל את האוכל בשמחה",
    "השמש הגדולה זורחת על הים הכחול","המורה היפה כותבת בספר חדש ומעניין",
    "הענן הלבן עף גבוה מאוד בשמיים","הבית הירוק הגדול נמצא ליד ההר",
    "הילדה השמחה קופצת על החבל הארוך","המחשב החדש והמהיר עובד ללא הפסקה",
    "הפרח הצבעוני היפה פורח באביב החם","האוטובוס הגדול נוסע לעיר הגדולה"
];
const emojis = ["🌅","🏖️","🌳","🏙️","🐕","🌺","⛵","🏔️","🌈","🎪"];

let currentLevel = 1, currentIndex = 0, gameItems = [];
let startTime = 0, timerInterval = null, finalTime = 0, activeLbTab = 1;

function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function getScores(level) {
    try { return JSON.parse(localStorage.getItem("scores_level_" + level) || "[]"); }
    catch { return []; }
}
function saveScores(level, scores) {
    localStorage.setItem("scores_level_" + level, JSON.stringify(scores));
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startGame(level) {
    currentLevel = level;
    currentIndex = 0;
    if (level === 1) gameItems = shuffle(wordsPool).slice(0, 10);
    else if (level === 2) gameItems = shuffle(phrases3).slice(0, 10);
    else if (level === 3) gameItems = shuffle(phrases5).slice(0, 10);
    else {
        const ph = shuffle(phrases6).slice(0, 10);
        const em = shuffle(emojis).slice(0, 10);
        gameItems = ph.map((p, i) => ({ text: p, emoji: em[i] }));
    }

    showScreen("countdown-screen");
    let count = 3;
    document.getElementById("countdown-display").innerText = count;
    const cd = setInterval(() => {
        count--;
        if (count > 0) document.getElementById("countdown-display").innerText = count;
        else { clearInterval(cd); launchGame(); }
    }, 1000);
}

function launchGame() {
    showScreen("game-ui");
    const wd = document.getElementById("word-display");
    wd.className = currentLevel === 1 ? "" : currentLevel === 4 ? "long" : "multi";
    const img = document.getElementById("image-container");
    img.className = currentLevel === 4 ? "visible" : "";
    startTime = Date.now();
    timerInterval = setInterval(() => {
        document.getElementById("timer-display").innerText = "⏱ " + ((Date.now() - startTime) / 1000).toFixed(1);
    }, 100);
    showItem();
}

function showItem() {
    const item = gameItems[currentIndex];
    document.getElementById("counter").innerText = "פריט " + (currentIndex + 1) + " מתוך 10";
    if (currentLevel === 4) {
        document.getElementById("word-display").innerText = item.text;
        document.getElementById("image-container").innerHTML = "<span style='font-size:6rem'>" + item.emoji + "</span>";
    } else {
        document.getElementById("word-display").innerText = item;
    }
}

function nextItem() {
    currentIndex++;
    if (currentIndex >= 10) endGame();
    else showItem();
}

function endGame() {
    clearInterval(timerInterval);
    finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById("final-time-display").innerText = finalTime + " שניות";
    document.getElementById("player-name").value = "";
    showScreen("name-entry");
}

function saveScore() {
    const name = document.getElementById("player-name").value.trim() || "אנונימי";
    const scores = getScores(currentLevel);
    scores.push({ name, time: parseFloat(finalTime), date: new Date().toLocaleDateString("he-IL") });
    scores.sort((a, b) => a.time - b.time);
    saveScores(currentLevel, scores.slice(0, 20));
    showLeaderboard(currentLevel);
}

function showLeaderboard(level) {
    activeLbTab = level || 1;
    showScreen("leaderboard");
    document.querySelectorAll(".lb-tab").forEach((t, i) => t.classList.toggle("active", i + 1 === activeLbTab));
    renderLb(activeLbTab);
}

function switchLbTab(level) {
    activeLbTab = level;
    document.querySelectorAll(".lb-tab").forEach((t, i) => t.classList.toggle("active", i + 1 === level));
    renderLb(level);
}

function renderLb(level) {
    const scores = getScores(level);
    const list = document.getElementById("lb-list");
    if (scores.length === 0) {
        list.innerHTML = "<li style='justify-content:center;color:#bbb;font-style:italic'>אין תוצאות עדיין</li>";
        return;
    }
    const m = ["🥇","🥈","🥉"];
    list.innerHTML = scores.slice(0, 10).map((s, i) =>
        "<li><span class='lb-rank'>" + (m[i] || (i+1)) + "</span><span class='lb-name'>" + s.name + "</span><span class='lb-time'>" + s.time + "s</span></li>"
    ).join("");
}

let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById("install-banner").style.display = "block";
});
document.getElementById("install-btn").addEventListener("click", async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById("install-banner").style.display = "none"; }
});
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(() => {});
</script>
</body>
</html>
