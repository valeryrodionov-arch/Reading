<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff4d4d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="קריאה מהירה">
    <link rel="manifest" href="manifest.json">
    <title>משחק הקריאה המהירה</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            -webkit-tap-highlight-color: transparent;
        }
        #game-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 88%;
            max-width: 500px;
        }

        /* תפריט ראשי */
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }
        #menu h1 { font-size: 2rem; color: #333; margin-bottom: 0.5rem; }
        #menu p { color: #666; font-size: 1rem; margin: 0; }
        #mic-permission-status {
            font-size: 0.95rem;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            background: #f0f2f5;
            color: #555;
            min-height: 1.5rem;
        }
        #start-button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1e8449;
            transition: all 0.1s;
        }
        #start-button:active { box-shadow: 0 0 0 #1e8449; transform: translateY(4px); }
        #start-button:disabled { background-color: #aaa; box-shadow: 0 4px 0 #888; cursor: not-allowed; }

        /* משחק */
        #word-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 2rem 0;
            min-height: 100px;
            color: #333;
        }
        #red-button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #cc0000;
            transition: all 0.1s;
        }
        #red-button:active { box-shadow: 0 0 0 #cc0000; transform: translateY(4px); }

        /* תוצאות */
        #results { display: none; text-align: right; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; text-decoration: line-through; }
        .stats { font-size: 1.2rem; margin-bottom: 1rem; }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; font-size: 1.2rem; }
        #mic-status { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
        .action-button {
            margin: 8px 4px 0;
            padding: 10px 24px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            background-color: #3498db;
            color: white;
            box-shadow: 0 3px 0 #2176ae;
            transition: all 0.1s;
        }
        .action-button:active { box-shadow: 0 0 0 #2176ae; transform: translateY(3px); }

        /* באנר התקנה */
        #install-banner {
            display: none;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            color: #555;
            margin-top: 1rem;
            text-align: center;
        }
        #install-btn {
            background: #ffc107;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div id="game-container">

    <!-- תפריט ראשי -->
    <div id="menu">
        <h1>🏃 משחק הקריאה המהירה</h1>
        <p>קרא כמה שיותר מילים בקול רם — המיקרופון מקשיב!</p>
        <div id="mic-permission-status">⏳ מבקש גישה למיקרופון...</div>
        <button id="start-button" disabled>התחל משחק</button>
        <div id="install-banner">
            📲 רוצה להוסיף למסך הבית?
            <br>
            <button id="install-btn">הוסף כאפליקציה</button>
        </div>
    </div>

    <!-- ממשק המשחק -->
    <div id="game-ui" style="display:none;">
        <div id="counter">מילה 1 מתוך 10</div>
        <div id="mic-status">🎤 מחכה לזיהוי דיבור...</div>
        <div id="word-display">טוען...</div>
        <button id="red-button">לחץ ועבור למילה הבאה</button>
    </div>

    <!-- תוצאות -->
    <div id="results">
        <h2>סיכום משחק</h2>
        <div class="stats" id="total-time"></div>
        <div class="stats" id="score"></div>
        <h3>רשימת המילים:</h3>
        <ul id="words-list"></ul>
        <div style="text-align:center;">
            <button class="action-button" onclick="showMenu()">🏠 תפריט ראשי</button>
            <button class="action-button" onclick="startGame()" style="background-color:#27ae60; box-shadow:0 3px 0 #1e8449;">🔄 משחק חדש</button>
        </div>
    </div>
</div>

<script>
    // רישום Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // באנר התקנה
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-banner').style.display = 'block';
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('install-banner').style.display = 'none';
        }
    });

    // --- לוגיקת המשחק ---
    const wordsPool = [
        "שולחן", "לרוץ", "גדול", "בית", "ספר", "מהיר", "לאכול", "ילד", "ירוק", "חכם",
        "מחשב", "לכתוב", "יפה", "שמש", "ענן", "לקפוץ", "קטן", "חריף", "מורה", "לטייל"
    ];

    let currentWordIndex = 0;
    let gameWords = [], userResults = [];
    let startTime, recognition, lastHeard = "";

    const micPermStatus = document.getElementById('mic-permission-status');
    const startButton = document.getElementById('start-button');
    const micStatus = document.getElementById('mic-status');

    async function requestMicPermission() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop());
            micPermStatus.textContent = "✅ המיקרופון אושר! אפשר להתחיל.";
            micPermStatus.style.color = "#27ae60";
            startButton.disabled = false;
            initSpeechRecognition();
        } catch {
            micPermStatus.textContent = "❌ גישה למיקרופון נדחתה. אפשר לשחק בלי זיהוי דיבור.";
            micPermStatus.style.color = "#e74c3c";
            startButton.disabled = false;
            startButton.textContent = "התחל בלי מיקרופון";
        }
    }

    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'he-IL';
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.onresult = (e) => {
            lastHeard = e.results[e.results.length - 1][0].transcript.trim();
            micStatus.textContent = `🎤 שמעתי: "${lastHeard}"`;
        };
        recognition.onerror = (e) => { micStatus.textContent = `⚠️ שגיאה: ${e.error}`; };
        recognition.onstart = () => { micStatus.textContent = "🎤 מקשיב..."; };
    }

    function showMenu() {
        if (recognition) try { recognition.stop(); } catch {}
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('results').style.display = 'none';
    }

    function startGame() {
        currentWordIndex = 0; gameWords = []; userResults = []; lastHeard = "";
        document.getElementById('menu').style.display = 'none';
        document.getElementById('results').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('words-list').innerHTML = '';
        gameWords = [...wordsPool].sort(() => 0.5 - Math.random()).slice(0, 10);

        // מתחילים את המיקרופון ומחכים 2 שניות לפני שמציגים את המילה הראשונה
        if (recognition) {
            try { recognition.start(); } catch {}
        } else {
            micStatus.textContent = "⚠️ זיהוי דיבור לא זמין";
        }

        // ספירה לאחור לפני תחילת המשחק
        const wordDisplay = document.getElementById('word-display');
        const redButton = document.getElementById('red-button');
        redButton.disabled = true;
        let count = 3;
        wordDisplay.innerText = count;
        document.getElementById('counter').innerText = "מתחילים בעוד...";
        const countdown = setInterval(() => {
            count--;
            if (count > 0) {
                wordDisplay.innerText = count;
            } else {
                clearInterval(countdown);
                redButton.disabled = false;
                startTime = Date.now();
                showWord();
            }
        }, 1000);
    }

    function showWord() {
        if (currentWordIndex < 10) {
            document.getElementById('word-display').innerText = gameWords[currentWordIndex];
            document.getElementById('counter').innerText = `מילה ${currentWordIndex + 1} מתוך 10`;
        } else endGame();
    }

    function endGame() {
        const totalSeconds = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('total-time').innerText = `זמן כולל: ${totalSeconds} שניות`;
        let correctCount = 0;
        const list = document.getElementById('words-list');
        list.innerHTML = '';
        userResults.forEach(res => {
            const li = document.createElement('li');
            li.innerText = res.word;
            if (res.isCorrect) { li.className = 'correct'; correctCount++; }
            else { li.className = 'wrong'; li.innerText += ` (נשמע: ${res.heard})`; }
            list.appendChild(li);
        });
        document.getElementById('score').innerText = `מילים שנקראו נכון: ${correctCount} מתוך 10`;
        if (recognition) try { recognition.stop(); } catch {}
    }

    document.getElementById('red-button').addEventListener('click', () => {
        const word = gameWords[currentWordIndex];
        // קופאים על מה שנשמע בדיוק ברגע הלחיצה
        const heardAtClick = lastHeard;
        const isCorrect = heardAtClick !== "" && (heardAtClick.includes(word) || word.includes(heardAtClick));
        userResults.push({ word, isCorrect, heard: heardAtClick || "לא נשמע" });

        // מאפסים ועוצרים את הזיהוי — מתחילים נקי למילה הבאה
        lastHeard = "";
        if (recognition) try { recognition.stop(); } catch {}

        const btn = document.getElementById('red-button');
        btn.disabled = true;
        currentWordIndex++;

        setTimeout(() => {
            showWord();
            if (recognition) try { recognition.start(); } catch {}
            btn.disabled = false;
        }, 700);
    });

    startButton.addEventListener('click', startGame);
    requestMicPermission();
</script>
</body>
</html>
